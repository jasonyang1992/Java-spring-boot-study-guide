<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Java & Spring Boot Study Guide Quiz</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.correct{
    background-color:#d4edda !important; /* green */
}
.wrong{
    background-color:#f8d7da !important; /* red */
}
.correct-answer{
    margin-top:5px;
    font-style:italic;
    color:#155724; /* dark green */
}
/* Flash animation for Reset button */
@keyframes flashRed {
    0% { background-color: #dc3545; }
    50% { background-color: #ff6b6b; }
    100% { background-color: #dc3545; }
}
.flash {
    animation: flashRed 0.5s ease;
}
</style>
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="text-center mb-4">Java & Spring Boot Study Guide Quiz</h1>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="quizTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="java-tab" data-bs-toggle="tab" data-bs-target="#java" type="button" role="tab">Java Quiz</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="spring-tab" data-bs-toggle="tab" data-bs-target="#spring" type="button" role="tab">Spring Boot Quiz</button>
      </li>
    </ul>

    <div class="tab-content">
        <!-- Java Quiz Tab -->
        <div class="tab-pane fade show active" id="java" role="tabpanel">
            <form id="javaQuizForm" class="bg-white p-4 rounded shadow"></form>
            <div class="text-center mt-4">
                <button type="button" class="btn btn-primary btn-lg me-2" onclick="calculateScore('java')">Submit Java Quiz</button>
                <button type="button" class="btn btn-danger btn-lg" id="javaResetBtn" onclick="resetQuiz('java')">Reset Java Quiz</button>
            </div>
            <div id="javaResult" class="text-center mt-4 fs-4 fw-bold"></div>
        </div>

        <!-- Spring Boot Quiz Tab -->
        <div class="tab-pane fade" id="spring" role="tabpanel">
            <form id="springQuizForm" class="bg-white p-4 rounded shadow"></form>
            <div class="text-center mt-4">
                <button type="button" class="btn btn-primary btn-lg me-2" onclick="calculateScore('spring')">Submit Spring Quiz</button>
                <button type="button" class="btn btn-danger btn-lg" id="springResetBtn" onclick="resetQuiz('spring')">Reset Spring Quiz</button>
            </div>
            <div id="springResult" class="text-center mt-4 fs-4 fw-bold"></div>
        </div>
    </div>
</div>

<script>
// =====================
// Java Questions 
// =====================
const javaQuestions = [
    {q:"Which of the following is NOT a Java primitive type?", options:["int","double","boolean","String"], answer:"String"},
    {q:"Which method is used to compare two strings for equality?", options:["==","equals()","compareTo()","match()"], answer:"equals()"},
    {q:"Which keyword is used to declare a constant in Java?", options:["const","final","static","immutable"], answer:"final"},
    {q:"Which class is used to read input from the console?", options:["Scanner","InputStreamReader","BufferedReader","Console"], answer:"Scanner"},
    {q:"Which exception is thrown when you divide by zero?", options:["IOException","ArithmeticException","NullPointerException","ClassNotFoundException"], answer:"ArithmeticException"},
    {q:"Which operator is used to perform logical OR?", options:["|","||","&","&&"], answer:"||"},
    {q:"Which of these is a valid constructor for a class named 'Person'?", options:["public void Person()","public Person()","void Person()","Person(){}"], answer:"public Person()"},
    {q:"Which keyword is used to inherit a class in Java?", options:["extends","implements","inherits","super"], answer:"extends"},
    {q:"Which loop executes at least once even if the condition is false?", options:["for","while","do-while","foreach"], answer:"do-while"},
    {q:"Which of the following is used for multithreading in Java?", options:["Thread class","Runnable interface","Both Thread and Runnable","None"], answer:"Both Thread and Runnable"},
    {q:"Which keyword is used to prevent a method from being overridden?", options:["final","static","abstract","private"], answer:"final"},
    {q:"Which access modifier allows access within the same package but not outside?", options:["public","private","protected","default"], answer:"default"},
    {q:"Which of the following is immutable in Java?", options:["String","StringBuilder","StringBuffer","ArrayList"], answer:"String"},
    {q:"Which package contains the ArrayList class?", options:["java.util","java.lang","java.io","java.net"], answer:"java.util"},
    {q:"Which method converts a string to an integer?", options:["Integer.parseInt()","Integer.toInt()","Integer.valueOf()","String.toInt()"], answer:"Integer.parseInt()"},
    {q:"Which keyword is used to create a thread-safe singleton?", options:["synchronized","final","static","volatile"], answer:"synchronized"},
    {q:"Which keyword is used to define a block of code that always executes after try-catch?", options:["finally","final","finallyBlock","cleanup"], answer:"finally"},
    {q:"Which of these is NOT a valid Java identifier?", options:["myVar","_myVar","2ndVar","varName"], answer:"2ndVar"},
    {q:"Which of these statements about Java is true?", options:["Java is platform independent","Java is platform dependent","Java does not support OOP","Java cannot run on a browser"], answer:"Java is platform independent"},
    {q:"Which keyword is used to stop a thread?", options:["stop()","exit()","terminate()","kill()"], answer:"stop()"},
    {q:"Which class is used to represent strings?", options:["String","StringBuilder","StringBuffer","Char"], answer:"String"},
    {q:"Which operator is used for modulus?", options:["%","/","*","mod"], answer:"%"},
    {q:"Which keyword is used to call a constructor of the same class?", options:["this","super","base","parent"], answer:"this"},
    {q:"Which statement skips the current iteration of a loop?", options:["break","continue","return","pass"], answer:"continue"},
    {q:"Which exception occurs when accessing a null object?", options:["NullPointerException","IOException","ClassNotFoundException","ArithmeticException"], answer:"NullPointerException"},
    {q:"Which method is used to start a thread?", options:["run()","start()","init()","execute()"], answer:"start()"},
    {q:"Which class is used for input-output operations?", options:["java.io","java.net","java.util","java.lang"], answer:"java.io"},
    {q:"Which keyword is used for abstract methods?", options:["abstract","final","static","private"], answer:"abstract"},
    {q:"Which interface allows iteration over collections?", options:["Iterable","Iterator","Collection","Enumeration"], answer:"Iterable"},
    {q:"Which keyword is used for static variables?", options:["const","static","final","immutable"], answer:"static"},
    {q:"Which data type stores true/false values?", options:["int","boolean","char","float"], answer:"boolean"},
    {q:"Which operator is used for bitwise OR?", options:["|","||","&","&&"], answer:"|"},
    {q:"Which method is used to read a line from Scanner?", options:["next()","nextLine()","readLine()","read()"], answer:"nextLine()"},
    {q:"Which class is the superclass of all classes?", options:["Object","Class","System","String"], answer:"Object"},
    {q:"Which keyword is used to prevent inheritance?", options:["final","static","abstract","private"], answer:"final"},
    {q:"Which keyword is used to define a package?", options:["package","import","include","namespace"], answer:"package"},
    {q:"Which keyword is used to handle exceptions?", options:["try-catch","throw","throws","final"], answer:"try-catch"},
    {q:"Which loop is best when the number of iterations is unknown?", options:["for","while","do-while","foreach"], answer:"while"},
    {q:"Which method is used to get the length of an array?", options:["length()","size()","length","count()"], answer:"length"},
    {q:"Which operator is used for logical AND?", options:["&","&&","|","||"], answer:"&&"},
    {q:"Which collection allows duplicates?", options:["Set","Map","List","Queue"], answer:"List"},
    {q:"Which access modifier allows access within the same package?", options:["public","private","protected","default"], answer:"default"},
    {q:"Which class provides methods for mathematical operations?", options:["Math","Number","Integer","Calculator"], answer:"Math"},
    {q:"Which operator is used to compare two objects?", options:["==","equals()","===","compare()"], answer:"equals()"},
    {q:"Which keyword is used to inherit multiple interfaces?", options:["extends","implements","interface","abstract"], answer:"implements"},
    {q:"Which exception occurs when array index is out of bounds?", options:["ArrayIndexOutOfBoundsException","NullPointerException","IOException","NumberFormatException"], answer:"ArrayIndexOutOfBoundsException"},
    {q:"Which keyword is used to define a block of code that always executes after try-catch?", options:["finally","final","finallyBlock","cleanup"], answer:"finally"},
    {q:"Which method is used to print text in Java?", options:["print()","println()","printf()","All the answers"], answer:"All the answers"},
    {q:"Which interface is used to create threads in Java?", options:["Runnable","Callable","Threadable","Executor"], answer:"Runnable"},
    {q:"Which keyword is used to call a constructor of the parent class?", options:["this","super","parent","base"], answer:"super"},
];

// =====================
// Spring Boot Questions
// =====================
const springQuestions = [
    {q:"Which annotation is used for dependency injection in Spring?", options:["@Inject","@Autowired","@Bean","@Component"], answer:"@Autowired"},
    {q:"Which annotation marks a class as a Spring component?", options:["@Component","@Service","@Repository","@All the answers"], answer:"@All the answers"},
    {q:"Which annotation is used to build REST APIs in Spring Boot?", options:["@RestController","@Controller","@Api","@WebController"], answer:"@RestController"},
    {q:"Which annotation handles HTTP GET requests?", options:["@Get","@GetMapping","@RequestGet","@Fetch"], answer:"@GetMapping"},
    {q:"Which annotation handles HTTP POST requests?", options:["@PostMapping","@SendMapping","@RequestPost","@Post"], answer:"@PostMapping"},
    {q:"Which file is commonly used for configuration in Spring Boot?", options:["application.properties","config.xml","spring.conf","settings.xml"], answer:"application.properties"},
    {q:"Which annotation is used to inject values from properties?", options:["@Property","@Value","@Config","@InjectValue"], answer:"@Value"},
    {q:"Which Spring module is used to create web applications?", options:["Spring MVC","Spring Data","Spring Security","Spring Batch"], answer:"Spring MVC"},
    {q:"Which annotation is used to define a service layer component?", options:["@Controller","@Service","@Repository","@Component"], answer:"@Service"},
    {q:"Which annotation is used to define a repository layer component?", options:["@Repository","@Component","@Data","@DAO"], answer:"@Repository"},
    {q:"Which annotation maps URL path variables?", options:["@PathVariable","@PathParam","@Variable","@UrlVariable"], answer:"@PathVariable"},
    {q:"Which annotation maps query parameters?", options:["@RequestParam","@QueryParam","@Param","@InputParam"], answer:"@RequestParam"},
    {q:"Which annotation is used to define a bean manually?", options:["@Bean","@Component","@Service","@Inject"], answer:"@Bean"},
    {q:"Which container manages Spring beans?", options:["Spring IoC Container","Servlet Container","JVM","Tomcat"], answer:"Spring IoC Container"},
    {q:"What does IoC stand for in Spring?", options:["Inversion of Control","Injection of Code","Instance of Class","Input of Configuration"], answer:"Inversion of Control"},
    {q:"Which annotation enables auto configuration in Spring Boot?", options:["@EnableAutoConfiguration","@AutoConfig","@EnableConfig","@AutoEnable"], answer:"@EnableAutoConfiguration"},
    {q:"Which dependency is commonly used for database access?", options:["Spring JDBC","Spring Data JPA","Hibernate","All the answers"], answer:"All the answers"},
    {q:"Which annotation is used to enable scheduling?", options:["@EnableScheduling","@Schedule","@EnableTasks","@ScheduledTask"], answer:"@EnableScheduling"},
    {q:"Which annotation is used to run scheduled tasks?", options:["@Task","@Scheduled","@ScheduleRun","@Timer"], answer:"@Scheduled"},
    {q:"Which annotation enables caching in Spring?", options:["@EnableCaching","@CacheEnable","@EnableCache","@CacheOn"], answer:"@EnableCaching"},
    {q:"Which annotation marks transactional methods?", options:["@Transactional","@Transaction","@Commit","@Rollback"], answer:"@Transactional"},
    {q:"Which annotation defines request mapping at class level?", options:["@RequestMapping","@ControllerMapping","@UrlMapping","@Mapping"], answer:"@RequestMapping"},
    {q:"Which Spring project simplifies database operations?", options:["Spring Data","Spring Batch","Spring Cloud","Spring Integration"], answer:"Spring Data"},
    {q:"Which annotation is used to enable JPA repositories?", options:["@EnableJpaRepositories","@JpaRepositories","@EnableJpa","@EnableRepo"], answer:"@EnableJpaRepositories"},
    {q:"Which server is embedded by default in Spring Boot?", options:["Tomcat","Jetty","Undertow","GlassFish"], answer:"Tomcat"},
    {q:"Which annotation maps HTTP PUT requests?", options:["@PutMapping","@UpdateMapping","@RequestPut","@ModifyMapping"], answer:"@PutMapping"},
    {q:"Which annotation maps HTTP DELETE requests?", options:["@DeleteMapping","@RemoveMapping","@RequestDelete","@EraseMapping"], answer:"@DeleteMapping"},
    {q:"Which annotation validates request body objects?", options:["@Valid","@Validate","@Check","@ValidatedBody"], answer:"@Valid"},
    {q:"Which annotation is used to inject configuration properties into a class?", options:["@ConfigurationProperties","@PropertySource","@Value","@InjectProperties"], answer:"@ConfigurationProperties"},
    {q:"Which Spring Boot starter is used for building web applications?", options:["spring-boot-starter-web","spring-web","spring-mvc","spring-boot-web"], answer:"spring-boot-starter-web"},
    {q:"Which annotation enables Spring Security configuration?", options:["@EnableWebSecurity","@EnableSecurity","@SecurityConfig","@EnableAuth"], answer:"@EnableWebSecurity"},
    {q:"Which annotation is used to define configuration classes?", options:["@Configuration","@Config","@SpringConfig","@BeanConfig"], answer:"@Configuration"},
    {q:"Which interface is used for asynchronous execution in Spring?", options:["Callable","Future","Runnable","All the answers"], answer:"All the answers"},
    {q:"Which annotation enables async processing?", options:["@EnableAsync","@AsyncEnable","@AsyncConfig","@EnableThreads"], answer:"@EnableAsync"},
    {q:"Which annotation marks a method to run asynchronously?", options:["@Async","@Thread","@Background","@Future"], answer:"@Async"},
    {q:"Which annotation handles exceptions globally in Spring REST?", options:["@ControllerAdvice","@ExceptionHandler","@RestException","@GlobalException"], answer:"@ControllerAdvice"},
    {q:"Which annotation handles specific exceptions?", options:["@ExceptionHandler","@ErrorHandler","@CatchException","@HandleError"], answer:"@ExceptionHandler"},
    {q:"Which Spring module is used for microservices configuration management?", options:["Spring Cloud Config","Spring Batch","Spring Integration","Spring Messaging"], answer:"Spring Cloud Config"},
    {q:"Which annotation exposes REST repositories automatically?", options:["@RepositoryRestResource","@RestRepository","@ExposeRepository","@ApiRepository"], answer:"@RepositoryRestResource"},
    {q:"Which annotation is used for cross-origin requests?", options:["@CrossOrigin","@AllowOrigin","@EnableCors","@Cors"], answer:"@CrossOrigin"},
    {q:"Which Spring project provides distributed tracing?", options:["Spring Cloud Sleuth","Spring Monitor","Spring Trace","Spring Logger"], answer:"Spring Cloud Sleuth"},
    {q:"Which Spring module provides circuit breaker functionality?", options:["Spring Cloud CircuitBreaker","Spring Retry","Spring Fault","Spring Safe"], answer:"Spring Cloud CircuitBreaker"},
    {q:"Which annotation is used to define profiles in Spring?", options:["@Profile","@Environment","@ActiveProfile","@Env"], answer:"@Profile"},
    {q:"Which annotation activates profiles in tests?", options:["@ActiveProfiles","@TestProfile","@EnableProfile","@UseProfile"], answer:"@ActiveProfiles"},
    {q:"Which annotation disables Spring Boot auto configuration?", options:["@EnableAutoConfiguration(exclude=...)","@DisableAutoConfig","@StopAutoConfig","@NoAutoConfig"], answer:"@EnableAutoConfiguration(exclude=...)"},
    {q:"Which Spring Boot tool provides production-ready features like metrics and health checks?", options:["Spring Boot Actuator","Spring Monitor","Spring Metrics","Spring Watch"], answer:"Spring Boot Actuator"},
    {q:"Which endpoint shows application health in Actuator?", options:["/actuator/health","/health","/actuator/status","/status"], answer:"/actuator/health"},
    {q:"Which endpoint exposes application metrics in Actuator?", options:["/actuator/metrics","/metrics","/actuator/data","/monitor"], answer:"/actuator/metrics"},
    {q:"Which annotation is used to bind request body JSON to an object?", options:["@RequestBody","@Body","@JsonBody","@BindBody"], answer:"@RequestBody"}
];

// =====================
// Variables to hold current quiz questions
// =====================
let javaQuiz = shuffleArray(javaQuestions).slice(0,20);
let springQuiz = shuffleArray(springQuestions).slice(0,20);

// =====================
// Render quiz function
// =====================
function renderQuiz(tab){
    const quiz = tab === 'java' ? javaQuiz : springQuiz;
    const form = document.getElementById(tab + 'QuizForm');
    form.innerHTML = "";

    quiz.forEach((qObj, index) => {
        const div = document.createElement("div");
        div.className = "question mb-3 p-3 border rounded";
        div.id = `${tab}qDiv${index}`;

        let html = `<p class="fw-bold">${index + 1}. ${qObj.q}</p>`;
        const options = shuffleArray([...qObj.options]);
        options.forEach(opt => {

            html += `
                 <div class="form-check">
                    <input class="form-check-input" type="radio" name="${tab}q${index}" value="${opt}" id="${tab}q${index}-${opt}">
                    <label class="form-check-label" for="${tab}q${index}-${opt}">${opt}</label>
                </div>
            `;
        });
        html += `<div id="${tab}Correct${index}" class="correct-answer" style="display:none;"></div>`;
        div.innerHTML = html;
        form.appendChild(div);
    });
}

// =====================
// Calculate score
// =====================
function calculateScore(tab){
    const quiz = tab === 'java' ? javaQuiz : springQuiz;
    let score = 0;

    quiz.forEach((qObj, index) => {
        const div = document.getElementById(`${tab}qDiv${index}`);
        const correctDiv = document.getElementById(`${tab}Correct${index}`);
        const selected = document.querySelector(`input[name="${tab}q${index}"]:checked`);
        
        if(selected && selected.value === qObj.answer){
            score++;
            div.classList.add("correct");
            div.classList.remove("wrong");
            correctDiv.style.display = "none";
        } else {
            div.classList.add("wrong");
            div.classList.remove("correct");
            correctDiv.innerHTML = `Correct Answer: ${qObj.answer}`;
            correctDiv.style.display = "block";
        }
    });

    const percent = Math.round((score/quiz.length)*100);
    let feedback = percent >= 80 ? "Excellent!" : percent >= 50 ? "Good Job!" : "Try Again!";
    document.getElementById(tab + "Result").innerHTML = `Your Score: ${score} / ${quiz.length} (${percent}%) - ${feedback}`;
}

// =====================
// Reset quiz
// =====================
function resetQuiz(tab){
    const resetBtn = document.getElementById(tab + "ResetBtn");
    resetBtn.classList.add("flash");
    setTimeout(() => resetBtn.classList.remove("flash"), 500);

    if(tab === 'java'){
        javaQuiz = shuffleArray(javaQuestions).slice(0,20);
    } else {
        springQuiz = shuffleArray(springQuestions).slice(0,20);
    }
    renderQuiz(tab);
    document.getElementById(tab + "Result").innerHTML = "";
}

// =====================
// Utility: Shuffle array
// =====================
function shuffleArray(arr){
    return arr.sort(() => 0.5 - Math.random());
}

// =====================
// Initial render
// =====================
renderQuiz('java');
renderQuiz('spring');

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
